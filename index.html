<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CloudBurst Weather Portal</title>
</head>
<body>
    <div class="weather-container">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
        </div>

        <div class="weather-info" id="weather-info" style="display: none;">
            <h2 id="city-name">London, GB</h2>
            <div class="temp-container">
                <span id="temperature">20</span>°C
            </div>
            <p id="description">Clear Sky</p>
            
            <div class="details">
                <div class="col">
                    <div>
                        <p id="humidity">50%</p>
                        <p class="label">Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <div>
                        <p id="wind">15 km/h</p>
                        <p class="label">Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="error-msg" id="error-msg" style="display: none;">
            <p>❌ City not found. Please try again.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
